<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamikaze Football WC'26 — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1a;--surface:#111827;--surface2:#1a2436;
    --border:rgba(255,255,255,0.08);--accent:#e8b84b;--accent2:#2dd4bf;
    --red:#ef4444;--green:#22c55e;--text:#f1f5f9;--muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px 16px 60px}
  .app{max-width:900px;margin:0 auto}
  .header{text-align:center;padding:20px 0 18px}
  .header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,52px);letter-spacing:4px;line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,#fff 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .code-pill{display:inline-flex;align-items:center;gap:8px;margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 14px}
  .code-pill .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .code-pill .code{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;color:var(--accent)}
  .setup{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:400px;margin:0 auto}
  .setup h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:8px;text-transform:uppercase;text-align:center;outline:none;transition:border-color 0.2s}
  .field input:focus{border-color:var(--accent)}
  .btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;margin-top:12px}
  .btn-primary{background:var(--accent);color:#0a0f1a}
  .btn-primary:hover{background:#f5ca6a}
  .error{color:var(--red);font-size:12px;margin-top:8px;display:none}
  .spinner-wrap{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .refresh-note{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}
  /* Leaderboard */
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--accent2);margin:22px 0 10px}
  .leaderboard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:22px}
  .lb-row{display:grid;grid-template-columns:36px 1fr auto auto auto auto auto auto;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .lb-row:last-child{border-bottom:none}
  .lb-row.eliminated{opacity:0.35;filter:grayscale(1)}
  .lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);text-align:center}
  .lb-rank.gold{color:var(--accent)}
  .lb-rank.silver{color:#94a3b8}
  .lb-rank.bronze{color:#b45309}
  .lb-name{font-weight:600;font-size:14px}
  .lb-lives{font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:right}
  [data-tip]{position:relative;cursor:default}
  [data-tip]::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:var(--text);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400;white-space:nowrap;padding:5px 9px;border-radius:6px;border:1px solid var(--border);pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
  [data-tip]:hover::after{opacity:1}
  .lb-pct-tip::after{left:auto;right:0;transform:none;white-space:normal;min-width:120px;text-align:center}
  .lb-correct{font-size:12px;color:var(--accent2);text-align:right;white-space:nowrap}
  .lb-pct{font-size:11px;color:var(--muted);text-align:right}
  .life-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
  .life-bar{height:100%;border-radius:2px;transition:width 0.4s ease}
  /* Match history table */
  .history-wrap{overflow-x:auto;margin-bottom:0}
  .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px 12px;margin-bottom:22px}
  .chart-canvas{width:100%;height:200px}
  .history-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .filter-btn{font-size:11px;letter-spacing:1px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
  .filter-btn:hover{color:var(--accent2);border-color:var(--accent2)}
  .filter-btn.active{color:var(--accent2);border-color:var(--accent2);background:rgba(45,212,191,0.08)}
  .export-btn{margin-left:auto;font-size:11px;letter-spacing:1px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
  .export-btn:hover{color:var(--accent);border-color:var(--accent)}
  .surv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
  .surv-row:last-child{border-bottom:none}
  .surv-name{min-width:80px;font-weight:600}
  .surv-bar-wrap{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
  .surv-bar{height:100%;border-radius:5px;transition:width 0.4s}
  .surv-pct{min-width:42px;text-align:right;font-weight:600;font-size:13px}
  .surv-lives{font-size:11px;color:var(--muted);min-width:56px;text-align:right}
  .upset-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .upset-match{flex:1;min-width:180px}
  .upset-teams{font-size:15px;font-weight:600;margin-bottom:3px}
  .upset-meta{font-size:11px;color:var(--muted)}
  .upset-bar-wrap{flex:2;min-width:160px}
  .upset-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
  .upset-bar-label{min-width:56px;color:var(--muted)}
  .upset-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
  .upset-bar-fill{height:100%;border-radius:4px}
  .chart-pill{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1.5px solid;transition:opacity 0.15s;user-select:none;font-family:'DM Sans',sans-serif}
  .chart-pill.hidden{opacity:0.25}
  .round-section{margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .round-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--surface2);user-select:none}
  .round-section-header:hover{background:rgba(255,255,255,0.04)}
  .round-section-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--accent2)}
  .round-section-meta{font-size:11px;color:var(--muted)}
  .round-section-arrow{font-size:11px;color:var(--muted);transition:transform 0.2s}
  .round-section.collapsed .round-section-arrow{transform:rotate(-90deg)}
  .round-section.collapsed .round-section-body{display:none}
  .round-section-body{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
  thead th{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  thead th.center{text-align:center}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.04)}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,0.02)}
  td{padding:8px 10px;vertical-align:middle}
  td.match-name{font-weight:600;color:var(--text)}
  td.result{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent);text-align:center}
  td.pred-cell{text-align:center}
  .pred-hit{color:var(--green);font-weight:700}
  .pred-miss{color:var(--red)}
  .pred-none{color:var(--muted);opacity:0.4}
  .badge-group{font-size:10px;background:rgba(45,212,191,0.1);color:var(--accent2);border:1px solid rgba(45,212,191,0.2);border-radius:4px;padding:1px 5px}
  .badge-ko{font-size:10px;background:rgba(232,184,75,0.1);color:var(--accent);border:1px solid rgba(232,184,75,0.2);border-radius:4px;padding:1px 5px}
  .status-chip{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:1px}
  .status-live{background:rgba(34,197,94,0.13);color:var(--green)}
  .status-done{background:rgba(100,116,139,0.15);color:var(--muted)}
  .status-lobby{background:rgba(232,184,75,0.13);color:var(--accent)}
  @media(max-width:500px){
    .lb-row{grid-template-columns:28px 1fr auto auto}
    .lb-pct{display:none}
  }

  /* Player modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:6px}
  .modal-close:hover{color:var(--text);background:var(--surface2)}
  .modal-body{padding:18px 20px}
  .modal-stats{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .modal-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:90px;text-align:center}
  .modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px}
  .modal-stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .modal-match{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
  .modal-match:last-child{border-bottom:none}
  .modal-match-name{flex:1;line-height:1.4}
  .modal-pred{font-weight:700;font-size:13px;min-width:28px;text-align:right}
  .lb-name-btn{background:none;border:none;color:var(--text);font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-align:left;padding:0;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:2px}
  .lb-name-btn:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>KAMIKAZE FOOTBALL WC'26</h1>
    <p class="sub">Live Stats</p>
    <div id="code-display" style="display:none" class="code-pill">
      <span class="label">Game</span>
      <span class="code" id="code-label"></span>
    </div>
  </div>

  <div id="setup-area">
    <div class="setup">
      <h2>ENTER GAME CODE</h2>
      <div class="field">
        <label>Game Code</label>
        <input type="text" id="code-input" placeholder="ABCD" maxlength="6" autocomplete="off">
      </div>
      <div class="error" id="setup-error">Game not found — check the code.</div>
      <button class="btn btn-primary" id="load-btn">LOAD STATS</button>
    </div>
  </div>

  <div id="stats-area" style="display:none">
    <div class="refresh-note"><span class="spinner"></span>Auto-refreshing every 10s &nbsp;·&nbsp; <span id="last-updated"></span></div>
    <div class="section-title">STANDINGS</div>
    <div class="leaderboard" id="leaderboard"></div>
    <div class="section-title">BIGGEST UPSET</div>
    <div id="biggest-upset"></div>
    <div class="section-title">SURVIVAL PROBABILITY</div>
    <div id="survival-prob"></div>
    <div class="section-title">LIVES OVER TIME</div>
    <div class="chart-wrap"><canvas id="lives-chart" class="chart-canvas"></canvas><div id="chart-legend" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;"></div></div>
    <div class="section-title">MATCH HISTORY</div>
    <div class="history-controls">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="group">Group Stage</button>
      <button class="filter-btn" data-filter="ko">Knockout</button>
      <button class="filter-btn" data-filter="wrong">Wrong picks</button>
      <button class="export-btn" id="export-csv-btn">⬇ Export CSV</button>
    </div>
    <div id="history-rounds"></div>
  </div>
</div>

<script>

const FLAGS={

  'France':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1eb-1f1f7.svg','Senegal':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1f3.svg','Norway':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f3-1f1f4.svg',
  'Argentina':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1f7.svg','Algeria':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e9-1f1ff.svg','Austria':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1f9.svg',

function flag(t,size=18){
  const url=FLAGS[t];
  if(!url)return'';
  return`<img src="${url}" width="${size}" height="${size}" alt="${t}" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin-right:3px">`;
}

let gameCode='';
let pollTimer=null;

// Read code from URL if present
const urlCode=new URLSearchParams(location.search).get('code');
if(urlCode){
  document.getElementById('code-input').value=urlCode.toUpperCase();
  document.getElementById('load-btn').click();
}

async function fetchGame(code){
  try{
    const [stateRes,predsRes]=await Promise.all([
      fetch(`${FIREBASE_URL}/games/${code}/state.json`),
      fetch(`${FIREBASE_URL}/games/${code}/predictions.json`)
    ]);
    if(!stateRes.ok)return null;
    const state=await stateRes.json();
    if(!state)return null;
    state.predictions=predsRes.ok?(await predsRes.json()||{}):{};
    return state;
  }catch(e){return null;}
}

document.getElementById('load-btn').addEventListener('click',async()=>{
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  if(code.length<3){showError('Enter a valid game code');return;}
  hideError();
  document.getElementById('load-btn').textContent='Loading…';
  const g=await fetchGame(code);
  document.getElementById('load-btn').textContent='LOAD STATS';
  if(!g){showError('Game not found — check the code.');return;}
  gameCode=code;
  document.getElementById('setup-area').style.display='none';
  document.getElementById('stats-area').style.display='block';
  document.getElementById('code-display').style.display='inline-flex';
  document.getElementById('code-label').textContent=code;
  // Update page title and URL
  document.title=`WC'26 Stats — ${code}`;
  history.replaceState({},'',`?code=${code}`);
  render(g);
  startAutoRefresh();
});

document.getElementById('code-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('load-btn').click();
});

function showError(msg){const el=document.getElementById('setup-error');el.textContent=msg;el.style.display='block';}
function hideError(){document.getElementById('setup-error').style.display='none';}

function startAutoRefresh(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    const g=await fetchGame(gameCode);
    if(g)render(g);
    updateTimestamp();
  },10000);
}

function updateTimestamp(){
  document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
}

let currentGame=null;
function render(g){
  try{
  currentGame=g;
  updateTimestamp();
  // Show game status chip
  const statusMap={
    'lobby':'LOBBY',
    'playing':'LIVE',
    'done':'FINISHED',
    'bulk':'PREDICTING — GROUP STAGE',
  };
  let statusLabel=statusMap[g.status]||g.status;
  let statusClass='status-live';
  if(g.status==='lobby'){statusClass='status-lobby';}
  else if(g.status==='done'){statusClass='status-done';}
  else if(g.status&&g.status.startsWith('ko-bulk:')){statusLabel='PREDICTING — '+g.status.slice(8).toUpperCase();statusClass='status-lobby';}
  else if(g.status&&g.status.startsWith('reveal:')){statusLabel='REVEAL';statusClass='status-live';}
  const subEl=document.querySelector('.header .sub');
  if(subEl)subEl.innerHTML=`Live Stats &nbsp;·&nbsp; <span class="status-chip ${statusClass}">${statusLabel}</span>`;
  renderLeaderboard(g);
  renderBiggestUpset(g);
  renderSurvivalProb(g);
  renderLivesChart(g);
  renderHistory(g);
  }catch(e){
    console.error('render failed',e);
    document.getElementById('leaderboard').innerHTML=`<div style="color:red;padding:12px;font-size:12px">Render error: ${e.message}</div>`;
  }
}

// ─── LIVES CHART ─────────────────────────────────────────────────────────────
function renderSurvivalProb(g){
  const el=document.getElementById('survival-prob');
  if(!el)return;
  const players=Array.isArray(g.players)?g.players:Object.values(g.players||{});
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null);
  const totalMatches=Array.isArray(g.matches)?g.matches.length:Object.values(g.matches||{}).length;
  const remaining=totalMatches-g.currentMatchIdx;

  // If game is done or no remaining matches, skip
  if(g.status==='done'||remaining<=0){el.innerHTML='';return;}

  // Calculate each player's historical accuracy from played matches
  const accuracy={};
  players.forEach(p=>{
    const predicted=playedIdxs.filter(idx=>{
      const v=(g.predictions[idx]||{})[p.name];
      return v!=null;
    });
    const correct=playedIdxs.filter(idx=>{
      const r=results[idx];
      const v=(g.predictions[idx]||{})[p.name];
      return v!=null&&v===actualOutcome(r);
    }).length;
    // Personal accuracy, floor at 20% ceiling at 85% to be realistic
    accuracy[p.name]=playedIdxs.length>5
      ?Math.max(0.20,Math.min(0.85,correct/playedIdxs.length))
      :0.40; // default before enough data
  });

  // Monte Carlo simulation: run 2000 games per player
  const SIMS=2000;
  const survivalPct={};

  players.forEach(p=>{
    if(p.eliminated){survivalPct[p.name]=0;return;}
    const acc=accuracy[p.name];
    // Per match: correct (acc) = no loss, wrong (1-acc)*0.85 = -1, missed (1-acc)*0.15 = -2
    // Simplification: assume all remaining matches have a prediction (no missed)
    // Wrong prob = 1 - acc, lose 1 life; ~5% chance of no prediction, lose 2
    const pWrong=(1-acc)*0.92;
    const pMiss=(1-acc)*0.08;
    let survived=0;
    for(let s=0;s<SIMS;s++){
      let lives=p.lives;
      for(let m=0;m<remaining;m++){
        const r=Math.random();
        if(r<pWrong) lives=Math.max(0,lives-1);
        else if(r<pWrong+pMiss) lives=Math.max(0,lives-2);
        // ~8% chance of score bonus +1 life
        if(Math.random()<0.08) lives++;
        if(lives<=0)break;
      }
      if(lives>0)survived++;
    }
    survivalPct[p.name]=Math.round(survived/SIMS*100);
  });

  const sorted=[...players].sort((a,b)=>survivalPct[b.name]-survivalPct[a.name]);
  const maxPct=Math.max(...sorted.map(p=>survivalPct[p.name]),1);

  el.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:22px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Based on ${remaining} remaining match${remaining===1?'':'es'} and each player's accuracy so far (${SIMS} simulations)</div>
    ${sorted.map(p=>{
      const pct=survivalPct[p.name];
      const col=pct>=70?'var(--green)':pct>=35?'var(--accent)':'var(--red)';
      const acc=accuracy[p.name];
      return`<div class="surv-row${p.eliminated?' ':''}">
        <div class="surv-name">${p.name}${p.eliminated?' 💀':''}</div>
        <div class="surv-bar-wrap"><div class="surv-bar" style="width:${Math.round(pct/maxPct*100)}%;background:${col}"></div></div>
        <div class="surv-pct" style="color:${col}">${pct}%</div>
        <div class="surv-lives">❤️${p.lives} · ${Math.round(acc*100)}% acc</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderBiggestUpset(g){
  const el=document.getElementById('biggest-upset');
  if(!el)return;
  const results=g.results||{};
  const players=Array.isArray(g.players)?g.players:Object.values(g.players||{});
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(playedIdxs.length===0){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:12px 0">No matches played yet</div>';return;}

  let worstIdx=null, worstWrong=0, worstTotal=0;
  playedIdxs.forEach(idx=>{
    const r=results[idx];
    const actual=actualOutcome(r);
    const preds=g.predictions[idx]||{};
    const eligible=players.filter(p=>preds[p.name]!=null);
    const wrong=eligible.filter(p=>preds[p.name]!==actual).length;
    if(wrong>worstWrong||(wrong===worstWrong&&eligible.length>worstTotal)){
      worstWrong=wrong; worstTotal=eligible.length; worstIdx=idx;
    }
  });

  if(worstIdx===null){el.innerHTML='';return;}
  const match=g.matches[worstIdx];
  const r=results[worstIdx];
  const actual=actualOutcome(r);
  const preds=g.predictions[worstIdx]||{};
  const eligible=players.filter(p=>preds[p.name]!=null);
  const wrong=eligible.filter(p=>preds[p.name]!==actual).length;
  const right=eligible.length-wrong;
  const wrongPct=eligible.length>0?Math.round(wrong/eligible.length*100):0;
  const rightPct=100-wrongPct;
  const round=match.group?'Group '+match.group:(match.round||'KO');
  const resultLabel=actual==='home'?match.home:actual==='away'?match.away:'Draw';
  const penLabel=r.penWinner?' (pens)':'';

  el.innerHTML=`<div class="upset-card">
    <div class="upset-match">
      <div class="upset-teams">${flag(match.home,16)} ${match.home} ${r.home}–${r.away} ${flag(match.away,16)} ${match.away}</div>
      <div class="upset-meta">${round} · Result: ${flag(resultLabel==='Draw'?'':resultLabel,14)} ${resultLabel}${penLabel}</div>
    </div>
    <div class="upset-bar-wrap">
      <div class="upset-bar-row">
        <span class="upset-bar-label">❌ Wrong</span>
        <div class="upset-bar-track"><div class="upset-bar-fill" style="width:${wrongPct}%;background:var(--red)"></div></div>
        <span style="font-size:12px;font-weight:600;color:var(--red)">${wrong}/${eligible.length}</span>
      </div>
      <div class="upset-bar-row">
        <span class="upset-bar-label">✅ Correct</span>
        <div class="upset-bar-track"><div class="upset-bar-fill" style="width:${rightPct}%;background:var(--green)"></div></div>
        <span style="font-size:12px;font-weight:600;color:var(--green)">${right}/${eligible.length}</span>
      </div>
    </div>
  </div>`;
}

const hiddenChartPlayers=new Set();
const PLAYER_COLORS=['#e8b84b','#2dd4bf','#ef4444','#a78bfa','#34d399','#f97316','#60a5fa','#f472b6'];

function renderLivesChart(g){
  const canvas=document.getElementById('lives-chart');
  if(!canvas)return;
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(playedIdxs.length===0){canvas.style.display='none';document.getElementById('chart-legend').innerHTML='';return;}
  canvas.style.display='block';

  const players=Array.isArray(g.players)?g.players:Object.values(g.players||{});
  const maxLives=g.lives;

  // Build / update HTML legend pills
  const legend=document.getElementById('chart-legend');
  if(legend.children.length!==players.length){
    legend.innerHTML=players.map((p,pi)=>{
      const col=PLAYER_COLORS[pi%PLAYER_COLORS.length];
      return`<span class="chart-pill${hiddenChartPlayers.has(p.name)?' hidden':''}" data-player="${p.name}" style="color:${col};border-color:${col}">${p.name}</span>`;
    }).join('');
    legend.querySelectorAll('.chart-pill').forEach(pill=>{
      pill.addEventListener('click',()=>{
        const name=pill.dataset.player;
        if(hiddenChartPlayers.has(name))hiddenChartPlayers.delete(name);
        else hiddenChartPlayers.add(name);
        pill.classList.toggle('hidden');
        renderLivesChart(currentGame);
      });
    });
  }

  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||800, H=190;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const PAD={t:16,r:16,b:16,l:36};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;

  // Compute lives timeline per player
  const timelines={};
  players.forEach(p=>{timelines[p.name]=[g.lives];});
  const tempPlayers=players.map(p=>({name:p.name,lives:g.lives,correct:0,eliminated:false}));
  playedIdxs.forEach(idx=>{
    const r=results[idx];
    const actual=actualOutcome(r);
    const preds=g.predictions[idx]||{};
    tempPlayers.forEach(p=>{
      if(p.eliminated)return;
      const v=preds[p.name];
      if(v===actual)p.correct++;
      else if(v!=null){p.lives=Math.max(0,p.lives-1);if(p.lives===0)p.eliminated=true;}
      else{p.lives=Math.max(0,p.lives-2);if(p.lives===0)p.eliminated=true;}
      const sc=preds[p.name+'_score'];
      if(sc&&sc.home===r.home&&sc.away===r.away)p.lives++;
      timelines[p.name].push(p.lives);
    });
  });

  const pts=playedIdxs.length+1;

  // Y gridlines
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const y=PAD.t+cH*(1-f);
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px DM Sans';ctx.textAlign='right';
    ctx.fillText(Math.round(f*maxLives),PAD.l-4,y+3);
  });

  // Lines per player (skip hidden)
  players.forEach((p,pi)=>{
    if(hiddenChartPlayers.has(p.name))return;
    const col=PLAYER_COLORS[pi%PLAYER_COLORS.length];
    const tl=timelines[p.name];
    ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
    tl.forEach((lives,i)=>{
      const x=PAD.l+(pts>1?i*cW/(pts-1):0);
      const y=PAD.t+cH*(1-lives/maxLives);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    const lastX=PAD.l+(tl.length>1?(tl.length-1)*cW/(pts-1):0);
    const lastY=PAD.t+cH*(1-tl[tl.length-1]/maxLives);
    ctx.beginPath();ctx.arc(lastX,lastY,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  });
}

// ─── CSV EXPORT ──────────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  if(!e.target.closest('#export-csv-btn'))return;
  const g=currentGame;if(!g)return;
  const results=g.results||{};
  const players=[...g.players].sort((a,b)=>b.lives-a.lives||b.correct-a.correct);
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  const header=['Match','Round','Home','Away','Score','Result',...players.map(p=>p.name+'_pick'),...players.map(p=>p.name+'_score_pred')];
  const rows=playedIdxs.map(idx=>{
    const m=g.matches[idx];if(!m)return null;
    const r=results[idx];
    const actual=actualOutcome(r);
    const round=m.group?'Group '+m.group:(m.round||'KO');
    const score=r.home+'-'+r.away+(r.penWinner?' (pens)':'');
    const result=actual==='home'?m.home:actual==='away'?m.away:'Draw';
    const picks=players.map(p=>{const v=(g.predictions[idx]||{})[p.name];return v==null?'':v==='home'?m.home:v==='away'?m.away:'Draw';});
    const scorePreds=players.map(p=>{const sc=(g.predictions[idx]||{})[p.name+'_score'];return sc?sc.home+'-'+sc.away:'';});
    return[parseInt(idx)+1,round,m.home,m.away,score,result,...picks,...scorePreds];
  }).filter(Boolean);
  const csv=[header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kf-wc26-'+g.code+'.csv';
  a.click();
});

function closeModal(){document.getElementById('player-modal').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function showPlayerModal(playerName){
  const g=currentGame;
  if(!g)return;
  const p=g.players.find(pl=>pl.name===playerName);
  if(!p)return;
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(!g.predictions)g.predictions={};
  const maxLives=g.lives;
  const livePct=maxLives>0?Math.round(p.lives/maxLives*100):0;
  const barCol=livePct>60?'var(--green)':livePct>30?'var(--accent)':'var(--red)';
  const played=playedIdxs.length;
  const predicted=playedIdxs.filter(idx=>{const v=(g.predictions[idx]||{})[playerName];return v!=null;}).length;
  const accuracy=played>0?Math.round(p.correct/played*100):0;
  const scoreBonuses=playedIdxs.filter(idx=>{
    const r=results[idx];
    const sc=(g.predictions[idx]||{})[playerName+'_score'];
    return sc&&sc.home===r.home&&sc.away===r.away;
  }).length;

  const penWins=playedIdxs.filter(idx=>{
    const r=results[idx];
    if(!r||!r.penWinner)return false;
    const v=(g.predictions[idx]||{})[playerName];
    return v===r.penWinner;
  }).length;
  const streak=calcStreaks(playerName,playedIdxs,results,g.predictions||{});
  document.getElementById('modal-player-name').textContent=playerName;
  document.getElementById('modal-stats').innerHTML=`
    <div class="modal-stat"><div class="modal-stat-val" style="color:${barCol}">❤️ ${p.lives}</div><div class="modal-stat-label">Lives left</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">✓ ${p.correct}</div><div class="modal-stat-label">Correct</div></div>
    <div class="modal-stat"><div class="modal-stat-val">${accuracy}%</div><div class="modal-stat-label">Accuracy</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">🎯 ${scoreBonuses}</div><div class="modal-stat-label">Score bonuses</div></div>
    ${penWins>0?`<div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">🥅 ${penWins}</div><div class="modal-stat-label">Pen wins</div></div>`:''}
    ${streak.best>0?`<div class="modal-stat"><div class="modal-stat-val">🔥 ${streak.best}</div><div class="modal-stat-label">Best streak</div></div>`:''}
    <div class="modal-stat"><div class="modal-stat-val" style="color:${p.eliminated?'var(--red)':'var(--green)'}">${p.eliminated?'OUT':'LIVE'}</div><div class="modal-stat-label">Status</div></div>
  `;

  if(playedIdxs.length===0){
    document.getElementById('modal-picks').innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No matches played yet</div>';
  } else {
    document.getElementById('modal-picks').innerHTML=playedIdxs.map(idx=>{
      const match=g.matches[idx];
      if(!match)return'';
      const r=results[idx];
      const actual=actualOutcome(r);
      const preds=g.predictions[idx]||{};
      const v=preds[playerName];
      const correct=v&&v===actual;
      const wrong=v&&v!==actual;
      const roundBadge=match.group
        ?`<span class="badge-group">Grp ${match.group}</span>`
        :`<span class="badge-ko">${match.round||'KO'}</span>`;
      const predLabel=v==='home'?flag(match.home)+match.home:v==='away'?flag(match.away)+match.away:v==='draw'?'Draw':'—';
      const resultLabel=(actual==='home'?match.home:actual==='away'?match.away:'Draw')+(r.penWinner?' (pens)':'');
      const sc=(preds[playerName+'_score']);
      const scoreOk=sc&&sc.home===r.home&&sc.away===r.away;
      const scoreLabel=sc?` <span style="font-size:10px;color:${scoreOk?'var(--accent2)':'var(--muted)'}">(${sc.home}–${sc.away}${scoreOk?' +1❤️':''})</span>`:'';
      const pensLabel=r.penWinner?` <span style="font-size:10px;color:${correct?'var(--accent2)':'var(--muted)'}">(pens)</span>`:'';
      return`<div class="modal-match">
        <div class="modal-match-name">
          ${roundBadge}
          <span style="margin-left:5px">${flag(match.home)}${match.home} vs ${flag(match.away)}${match.away}</span><br>
          <span style="color:var(--muted);font-size:11px">${r.home}–${r.away} · ${resultLabel}</span>
        </div>
        <div class="modal-pred" style="color:${correct?'var(--green)':wrong?'var(--red)':'var(--muted)'}">${correct?'✅':wrong?'❌':'<span style="opacity:0.3">—</span>'} ${v?predLabel:''}${pensLabel}${scoreLabel}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('player-modal').style.display='flex';
}

function calcStreaks(playerName, playedIdxs, results, predictions){
  let best=0, current=0;
  playedIdxs.forEach(idx=>{
    const r=results[idx];
    const actual=actualOutcome(r);
    const v=(predictions[idx]||{})[playerName];
    if(v!=null&&v===actual){current++;best=Math.max(best,current);}
    else{current=0;}
  });
  return{best,current};
}

function renderLeaderboard(g){
  const sorted=[...g.players].sort((a,b)=>{
    if(a.eliminated&&!b.eliminated)return 1;
    if(!a.eliminated&&b.eliminated)return-1;
    return b.lives-a.lives||b.correct-a.correct;
  });
  const maxLives=g.lives;
  // Count played matches
  const playedIdxsLb=Object.keys(g.results||{}).map(Number).filter(n=>!isNaN(n)&&(g.results||{})[n]!=null);
  if(!g.predictions)g.predictions={};
  const el=document.getElementById('leaderboard');
  el.innerHTML=sorted.map((p,i)=>{
    const rankClass=i===0&&!p.eliminated?'gold':i===1&&!p.eliminated?'silver':i===2&&!p.eliminated?'bronze':'';
    const livePct=maxLives>0?Math.round(p.lives/maxLives*100):0;
    const barCol=livePct>60?'var(--green)':livePct>30?'var(--accent)':'var(--red)';
    const predictedLb=playedIdxsLb.filter(idx=>{const v=(g.predictions[idx]||{})[p.name];return v!=null;}).length;
    const accuracy=playedIdxsLb.length>0?Math.round(p.correct/playedIdxsLb.length*100):0;
    let scoreBonusLb=0;
    playedIdxsLb.forEach(idx=>{const r=(g.results||{})[idx];const sc=r&&(g.predictions[idx]||{})[p.name+'_score'];if(sc&&sc.home===r.home&&sc.away===r.away)scoreBonusLb++;});
    let penWinsLb=0;
    playedIdxsLb.forEach(idx=>{const r=(g.results||{})[idx];if(!r||!r.penWinner)return;const v=(g.predictions[idx]||{})[p.name];const actual=r.penWinner;if(v===actual)penWinsLb++;});
    const streakLb=calcStreaks(p.name,playedIdxsLb.sort((a,b)=>a-b),g.results||{},g.predictions||{});
    return`<div class="lb-row${p.eliminated?' eliminated':''}">
      <div class="lb-rank ${rankClass}">${p.eliminated?'💀':i+1}</div>
      <div>
        <button class="lb-name-btn" data-player="${p.name.replace(/"/g,'&quot;')}">${p.name}${p.isHost?' <span style="font-size:10px;color:var(--accent);opacity:0.7">(host)</span>':''}</button>
        <div class="life-bar-wrap"><div class="life-bar" style="width:${livePct}%;background:${barCol}"></div></div>
      </div>
      <div class="lb-lives" style="color:${barCol}" data-tip="Lives remaining out of ${maxLives}">❤️ ${p.lives}<span style="font-size:10px;color:var(--muted)">/${maxLives}</span></div>
      <div class="lb-correct" data-tip="Correct predictions">✓ ${p.correct}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Exact score bonuses" style="color:var(--accent2);font-size:12px">🎯 ${scoreBonusLb}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Penalty shootout wins correctly predicted" style="color:var(--accent2);font-size:12px">${penWinsLb>0?'🥅 '+penWinsLb:''}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Longest correct prediction streak">${streakLb.best>0?'🔥 '+streakLb.best:''}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Prediction accuracy (correct / matches played)">${accuracy}%</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.lb-name-btn').forEach(btn=>{
    btn.addEventListener('click',()=>showPlayerModal(btn.dataset.player));
  });
}

function actualOutcome(r){
  if(r.home>r.away)return'home';
  if(r.away>r.home)return'away';
  if(r.penWinner)return r.penWinner;
  return'draw';
}

function buildRoundRows(idxs, g, players, results) {
  const header = `<thead><tr><th>#</th><th>Match</th><th class="center">Result</th>${players.map(p=>`<th class="center">${p.name}</th>`).join('')}</tr></thead>`;
  const rows = idxs.map(idx => {
    const match = g.matches[idx];
    if (!match) return '';
    const r = results[idx];
    const actual = actualOutcome(r);
    const matchLabel = `${flag(match.home)}${match.home} <span style="color:var(--muted)">vs</span> ${flag(match.away)}${match.away}`;
    const preds = g.predictions[idx] || {};
    const predCells = players.map(p => {
      const v = preds[p.name];
      if (!v) return `<td class="pred-cell"><span class="pred-none">—</span></td>`;
      const correct = v === actual;
      const pickedTeam = v==='home'?match.home:v==='away'?match.away:'Draw';
      const pickedFlag = v==='draw'?'':flag(pickedTeam);
      const sc = preds[p.name+'_score'];
      const scoreOk = sc&&sc.home===r.home&&sc.away===r.away;
      const scoreBadge = sc?`<span style="font-size:10px;margin-left:4px;padding:1px 5px;border-radius:4px;background:${scoreOk?'rgba(45,212,191,0.15)':'rgba(255,255,255,0.05)'};color:${scoreOk?'var(--accent2)':'var(--muted)'}">${sc.home}–${sc.away}${scoreOk?' 🎯':''}</span>`:'';
      const isPenMatch = !!(r.penWinner);
      const pensBadge = isPenMatch?`<span style="font-size:10px;margin-left:3px;padding:1px 5px;border-radius:4px;background:${correct?'rgba(45,212,191,0.1)':'rgba(255,255,255,0.05)'};color:${correct?'var(--accent2)':'var(--muted)'}">(pens)</span>`:'';
      return `<td class="pred-cell ${correct?'pred-hit':'pred-miss'}" style="white-space:nowrap">${correct?'✅':'❌'} ${pickedFlag}${pickedTeam}${pensBadge}${scoreBadge}</td>`;
    }).join('');
    return `<tr>
      <td style="color:var(--muted);font-size:11px">${parseInt(idx)+1}</td>
      <td class="match-name">${matchLabel}<br><span style="font-size:10px;color:var(--muted)">${r.home}–${r.away}${r.penWinner?' (pens)':''} · ${actual==='home'?match.home:actual==='away'?match.away:'Draw'}</span></td>
      <td class="result">${r.home}–${r.away}${r.penWinner?`<br><span style="font-size:10px;color:var(--accent2)">${r.penWinner==='home'?'← pens':'pens →'}</span>`:''}</td>
      ${predCells}
    </tr>`;
  }).filter(Boolean).join('');
  return `<table>${header}<tbody>${rows}</tbody></table>`;
}

function renderHistory(g){
  const players=[...g.players].sort((a,b)=>{
    if(a.eliminated&&!b.eliminated)return 1;
    if(!a.eliminated&&b.eliminated)return-1;
    return b.lives-a.lives||b.correct-a.correct;
  });
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(!g.predictions)g.predictions={};
  const container = document.getElementById('history-rounds');
  if(playedIdxs.length===0){
    container.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px">No matches played yet</div>';
    return;
  }

  // Apply filter
  const filteredIdxs = playedIdxs.filter(idx => {
    const match = g.matches[idx];
    if (!match) return false;
    if (currentFilter === 'group') return !!match.group;
    if (currentFilter === 'ko') return !match.group;
    if (currentFilter === 'wrong') {
      const r = results[idx];
      const actual = actualOutcome(r);
      const preds = g.predictions[idx] || {};
      return players.some(p => {
        const v = preds[p.name];
        return v != null && v !== actual;
      });
    }
    return true;
  });

  if(filteredIdxs.length===0){
    container.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px">No matches match this filter</div>';
    return;
  }

  // Group indices by round label
  const roundOrder = [];
  const roundMap = {};
  filteredIdxs.forEach(idx => {
    const match = g.matches[idx];
    if (!match) return;
    const label = match.group ? 'Group Stage' : (match.round || 'KO');
    if (!roundMap[label]) { roundMap[label] = []; roundOrder.push(label); }
    roundMap[label].push(idx);
  });

  // Track collapsed state per round (persist across re-renders)
  if (!renderHistory._collapsed) renderHistory._collapsed = {};

  container.innerHTML = roundOrder.map(label => {
    const idxs = roundMap[label];
    const collapsed = renderHistory._collapsed[label] !== false && label === 'Group Stage' && roundOrder.length > 1;
    // Count correct per player for this round
    const meta = players.map(p => {
      const correct = idxs.filter(idx => {
        const r = results[idx]; const v = (g.predictions[idx]||{})[p.name];
        return v && v === actualOutcome(r);
      }).length;
      return `${p.name} ✓${correct}`;
    }).join(' · ');
    return `<div class="round-section${collapsed?' collapsed':''}" data-round="${label}">
      <div class="round-section-header">
        <span class="round-section-title">${label}</span>
        <span class="round-section-meta">${idxs.length} match${idxs.length===1?'':'es'} · ${meta}</span>
        <span class="round-section-arrow">▾</span>
      </div>
      <div class="round-section-body history-wrap">
        ${buildRoundRows(idxs, g, players, results)}
      </div>
    </div>`;
  }).join('');

  // Wire up collapse toggles
  container.querySelectorAll('.round-section-header').forEach(header => {
    header.addEventListener('click', () => {
      const section = header.closest('.round-section');
      const label = section.dataset.round;
      const isCollapsed = section.classList.toggle('collapsed');
      renderHistory._collapsed[label] = isCollapsed ? true : false;
    });
  });
}
</script>

  <div class="modal-overlay" id="player-modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">

        <div id="modal-picks"></div>
      </div>
    </div>
  </div>
