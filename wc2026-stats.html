<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamikaze Football WC'26 — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1a;--surface:#111827;--surface2:#1a2436;
    --border:rgba(255,255,255,0.08);--accent:#e8b84b;--accent2:#2dd4bf;
    --red:#ef4444;--green:#22c55e;--text:#f1f5f9;--muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px 16px 60px}
  .app{max-width:900px;margin:0 auto}
  .header{text-align:center;padding:20px 0 18px}
  .header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,52px);letter-spacing:4px;line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,#fff 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .code-pill{display:inline-flex;align-items:center;gap:8px;margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 14px}
  .code-pill .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .code-pill .code{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;color:var(--accent)}
  .setup{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:400px;margin:0 auto}
  .setup h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:8px;text-transform:uppercase;text-align:center;outline:none;transition:border-color 0.2s}
  .field input:focus{border-color:var(--accent)}
  .btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;margin-top:12px}
  .btn-primary{background:var(--accent);color:#0a0f1a}
  .btn-primary:hover{background:#f5ca6a}
  .error{color:var(--red);font-size:12px;margin-top:8px;display:none}
  .spinner-wrap{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .refresh-note{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}
  /* Leaderboard */
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--accent2);margin:22px 0 10px}
  .leaderboard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:22px}
  .lb-row{display:grid;grid-template-columns:36px 1fr auto auto auto;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .lb-row:last-child{border-bottom:none}
  .lb-row.eliminated{opacity:0.35;filter:grayscale(1)}
  .lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);text-align:center}
  .lb-rank.gold{color:var(--accent)}
  .lb-rank.silver{color:#94a3b8}
  .lb-rank.bronze{color:#b45309}
  .lb-name{font-weight:600;font-size:14px}
  .lb-lives{font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:right}
  [data-tip]{position:relative;cursor:default}
  [data-tip]::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:var(--text);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400;white-space:nowrap;padding:5px 9px;border-radius:6px;border:1px solid var(--border);pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
  [data-tip]:hover::after{opacity:1}
  .lb-pct-tip::after{left:auto;right:0;transform:none;white-space:normal;min-width:120px;text-align:center}
  .lb-correct{font-size:12px;color:var(--accent2);text-align:right;white-space:nowrap}
  .lb-pct{font-size:11px;color:var(--muted);text-align:right}
  .life-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
  .life-bar{height:100%;border-radius:2px;transition:width 0.4s ease}
  /* Match history table */
  .history-wrap{overflow-x:auto;margin-bottom:24px}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
  thead th{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  thead th.center{text-align:center}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.04)}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,0.02)}
  td{padding:8px 10px;vertical-align:middle}
  td.match-name{font-weight:600;color:var(--text)}
  td.result{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent);text-align:center}
  td.pred-cell{text-align:center}
  .pred-hit{color:var(--green);font-weight:700}
  .pred-miss{color:var(--red)}
  .pred-none{color:var(--muted);opacity:0.4}
  .badge-group{font-size:10px;background:rgba(45,212,191,0.1);color:var(--accent2);border:1px solid rgba(45,212,191,0.2);border-radius:4px;padding:1px 5px}
  .badge-ko{font-size:10px;background:rgba(232,184,75,0.1);color:var(--accent);border:1px solid rgba(232,184,75,0.2);border-radius:4px;padding:1px 5px}
  .status-chip{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:1px}
  .status-live{background:rgba(34,197,94,0.13);color:var(--green)}
  .status-done{background:rgba(100,116,139,0.15);color:var(--muted)}
  .status-lobby{background:rgba(232,184,75,0.13);color:var(--accent)}
  @media(max-width:500px){
    .lb-row{grid-template-columns:28px 1fr auto auto}
    .lb-pct{display:none}
  }

  /* Player modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
  .modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:6px}
  .modal-close:hover{color:var(--text);background:var(--surface2)}
  .modal-body{padding:18px 20px}
  .modal-stats{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .modal-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:90px;text-align:center}
  .modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px}
  .modal-stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .modal-match{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
  .modal-match:last-child{border-bottom:none}
  .modal-match-name{flex:1;line-height:1.4}
  .modal-pred{font-weight:700;font-size:13px;min-width:28px;text-align:right}
  .lb-name-btn{background:none;border:none;color:var(--text);font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-align:left;padding:0;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:2px}
  .lb-name-btn:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>KAMIKAZE FOOTBALL WC'26</h1>
    <p class="sub">Live Stats</p>
    <div id="code-display" style="display:none" class="code-pill">
      <span class="label">Game</span>
      <span class="code" id="code-label"></span>
    </div>
  </div>

  <div id="setup-area">
    <div class="setup">
      <h2>ENTER GAME CODE</h2>
      <div class="field">
        <label>Game Code</label>
        <input type="text" id="code-input" placeholder="ABCD" maxlength="6" autocomplete="off">
      </div>
      <div class="error" id="setup-error">Game not found — check the code.</div>
      <button class="btn btn-primary" id="load-btn">LOAD STATS</button>
    </div>
  </div>

  <div id="stats-area" style="display:none">
    <div class="refresh-note"><span class="spinner"></span>Auto-refreshing every 10s &nbsp;·&nbsp; <span id="last-updated"></span></div>
    <div class="section-title">STANDINGS</div>
    <div class="leaderboard" id="leaderboard"></div>
    <div class="section-title">MATCH HISTORY</div>
    <div class="history-wrap"><table id="history-table"><thead id="history-head"></thead><tbody id="history-body"></tbody></table></div>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://wc2026-4b84a-default-rtdb.europe-west1.firebasedatabase.app';
const FLAGS={
  'Mexico':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f2-1f1fd.svg','South Africa':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ff-1f1e6.svg','South Korea':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f0-1f1f7.svg',
  'Canada':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1e6.svg','Qatar':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f6-1f1e6.svg','Switzerland':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1ed.svg',
  'USA':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1fa-1f1f8.svg','Paraguay':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f5-1f1fe.svg','Australia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1fa.svg',
  'Scotland':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3f4-e0067-e0062-e0073-e0063-e0074-e007f.svg',
  'Brazil':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e7-1f1f7.svg','Morocco':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f2-1f1e6.svg','Haiti':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ed-1f1f9.svg',
  'Netherlands':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f3-1f1f1.svg','Germany':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e9-1f1ea.svg','Ivory Coast':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1ee.svg',
  'Ecuador':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ea-1f1e8.svg','Curacao':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1fc.svg','Tunisia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f9-1f1f3.svg',
  'Japan':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ef-1f1f5.svg','Spain':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ea-1f1f8.svg','Cape Verde':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1fb.svg',
  'Saudi Arabia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1e6.svg','Uruguay':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1fa-1f1fe.svg','Belgium':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e7-1f1ea.svg',
  'Egypt':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ea-1f1ec.svg','Iran':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ee-1f1f7.svg','New Zealand':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f3-1f1ff.svg',
  'France':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1eb-1f1f7.svg','Senegal':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1f3.svg','Norway':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f3-1f1f4.svg',
  'Argentina':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1f7.svg','Algeria':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e9-1f1ff.svg','Austria':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1f9.svg',
  'Jordan':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ef-1f1f4.svg','Portugal':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f5-1f1f9.svg','Uzbekistan':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1fa-1f1ff.svg',
  'Colombia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1f4.svg','England':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3f4-e0067-e0062-e0065-e006e-e0067-e007f.svg',
  'Croatia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ed-1f1f7.svg','Ghana':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ec-1f1ed.svg','Panama':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f5-1f1e6.svg',
  'Poland':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f5-1f1f1.svg','Albania':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e6-1f1f1.svg','Sweden':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1ea.svg',
  'Ukraine':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1fa-1f1e6.svg','Italy':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ee-1f1f9.svg',
  'Wales':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3f4-e0067-e0062-e0077-e006c-e0073-e007f.svg',
  'Bosnia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e7-1f1e6.svg','Turkey':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f9-1f1f7.svg','Romania':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f7-1f1f4.svg',
  'Slovakia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1f0.svg','DR Congo':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e8-1f1e9.svg','Jamaica':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ef-1f1f2.svg',
  'New Caledonia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f3-1f1e8.svg','Iraq':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1ee-1f1f6.svg',
  'Bolivia':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1e7-1f1f4.svg','Suriname':'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f1f8-1f1f7.svg',
};
function flag(t,size=18){
  const url=FLAGS[t];
  if(!url)return'';
  return`<img src="${url}" width="${size}" height="${size}" alt="${t}" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin-right:3px">`;
}

let gameCode='';
let pollTimer=null;

// Read code from URL if present
const urlCode=new URLSearchParams(location.search).get('code');
if(urlCode){
  document.getElementById('code-input').value=urlCode.toUpperCase();
  document.getElementById('load-btn').click();
}

async function fetchGame(code){
  try{
    const [stateRes,predsRes]=await Promise.all([
      fetch(`${FIREBASE_URL}/games/${code}/state.json`),
      fetch(`${FIREBASE_URL}/games/${code}/predictions.json`)
    ]);
    if(!stateRes.ok)return null;
    const state=await stateRes.json();
    if(!state)return null;
    state.predictions=predsRes.ok?(await predsRes.json()||{}):{};
    return state;
  }catch(e){return null;}
}

document.getElementById('load-btn').addEventListener('click',async()=>{
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  if(code.length<3){showError('Enter a valid game code');return;}
  hideError();
  document.getElementById('load-btn').textContent='Loading…';
  const g=await fetchGame(code);
  document.getElementById('load-btn').textContent='LOAD STATS';
  if(!g){showError('Game not found — check the code.');return;}
  gameCode=code;
  document.getElementById('setup-area').style.display='none';
  document.getElementById('stats-area').style.display='block';
  document.getElementById('code-display').style.display='inline-flex';
  document.getElementById('code-label').textContent=code;
  // Update page title and URL
  document.title=`WC'26 Stats — ${code}`;
  history.replaceState({},'',`?code=${code}`);
  render(g);
  startAutoRefresh();
});

document.getElementById('code-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('load-btn').click();
});

function showError(msg){const el=document.getElementById('setup-error');el.textContent=msg;el.style.display='block';}
function hideError(){document.getElementById('setup-error').style.display='none';}

function startAutoRefresh(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    const g=await fetchGame(gameCode);
    if(g)render(g);
    updateTimestamp();
  },10000);
}

function updateTimestamp(){
  document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
}

let currentGame=null;
function render(g){
  try{
  currentGame=g;
  updateTimestamp();
  // Show game status chip
  const statusMap={
    'lobby':'LOBBY',
    'playing':'LIVE',
    'done':'FINISHED',
    'bulk':'PREDICTING — GROUP STAGE',
  };
  let statusLabel=statusMap[g.status]||g.status;
  let statusClass='status-live';
  if(g.status==='lobby'){statusClass='status-lobby';}
  else if(g.status==='done'){statusClass='status-done';}
  else if(g.status&&g.status.startsWith('ko-bulk:')){statusLabel='PREDICTING — '+g.status.slice(8).toUpperCase();statusClass='status-lobby';}
  else if(g.status&&g.status.startsWith('reveal:')){statusLabel='REVEAL';statusClass='status-live';}
  const subEl=document.querySelector('.header .sub');
  if(subEl)subEl.innerHTML=`Live Stats &nbsp;·&nbsp; <span class="status-chip ${statusClass}">${statusLabel}</span>`;
  renderLeaderboard(g);
  renderHistory(g);
  }catch(e){
    console.error('render failed',e);
    document.getElementById('leaderboard').innerHTML=`<div style="color:red;padding:12px;font-size:12px">Render error: ${e.message}</div>`;
  }
}

function closeModal(){document.getElementById('player-modal').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function showPlayerModal(playerName){
  const g=currentGame;
  if(!g)return;
  const p=g.players.find(pl=>pl.name===playerName);
  if(!p)return;
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(!g.predictions)g.predictions={};
  const maxLives=g.lives;
  const livePct=maxLives>0?Math.round(p.lives/maxLives*100):0;
  const barCol=livePct>60?'var(--green)':livePct>30?'var(--accent)':'var(--red)';
  const played=playedIdxs.length;
  const predicted=playedIdxs.filter(idx=>{const v=(g.predictions[idx]||{})[playerName];return v!=null;}).length;
  const accuracy=predicted>0?Math.round(p.correct/predicted*100):0;
  const scoreBonuses=playedIdxs.filter(idx=>{
    const r=results[idx];
    const sc=(g.predictions[idx]||{})[playerName+'_score'];
    return sc&&sc.home===r.home&&sc.away===r.away;
  }).length;

  document.getElementById('modal-player-name').textContent=playerName;
  document.getElementById('modal-stats').innerHTML=`
    <div class="modal-stat"><div class="modal-stat-val" style="color:${barCol}">❤️ ${p.lives}</div><div class="modal-stat-label">Lives left</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">✓ ${p.correct}</div><div class="modal-stat-label">Correct</div></div>
    <div class="modal-stat"><div class="modal-stat-val">${accuracy}%</div><div class="modal-stat-label">Accuracy</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">🎯 ${scoreBonuses}</div><div class="modal-stat-label">Score bonuses</div></div>
    <div class="modal-stat"><div class="modal-stat-val" style="color:${p.eliminated?'var(--red)':'var(--green)'}">${p.eliminated?'OUT':'LIVE'}</div><div class="modal-stat-label">Status</div></div>
  `;

  if(playedIdxs.length===0){
    document.getElementById('modal-picks').innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No matches played yet</div>';
  } else {
    document.getElementById('modal-picks').innerHTML=playedIdxs.map(idx=>{
      const match=g.matches[idx];
      if(!match)return'';
      const r=results[idx];
      const actual=actualOutcome(r);
      const preds=g.predictions[idx]||{};
      const v=preds[playerName];
      const correct=v&&v===actual;
      const wrong=v&&v!==actual;
      const roundBadge=match.group
        ?`<span class="badge-group">Grp ${match.group}</span>`
        :`<span class="badge-ko">${match.round||'KO'}</span>`;
      const predLabel=v==='home'?flag(match.home)+match.home:v==='away'?flag(match.away)+match.away:v==='draw'?'Draw':'—';
      const resultLabel=(actual==='home'?match.home:actual==='away'?match.away:'Draw')+(r.penWinner?' (pens)':'');
      const sc=(preds[playerName+'_score']);
      const scoreOk=sc&&sc.home===r.home&&sc.away===r.away;
      const scoreLabel=sc?` <span style="font-size:10px;color:${scoreOk?'var(--accent2)':'var(--muted)'}">(${sc.home}–${sc.away}${scoreOk?' +1❤️':''})</span>`:'';
      return`<div class="modal-match">
        <div class="modal-match-name">
          ${roundBadge}
          <span style="margin-left:5px">${flag(match.home)}${match.home} vs ${flag(match.away)}${match.away}</span><br>
          <span style="color:var(--muted);font-size:11px">${r.home}–${r.away} · ${resultLabel}</span>
        </div>
        <div class="modal-pred" style="color:${correct?'var(--green)':wrong?'var(--red)':'var(--muted)'}">${correct?'✅':wrong?'❌':'<span style="opacity:0.3">—</span>'} ${v?predLabel:''}${scoreLabel}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('player-modal').style.display='flex';
}

function renderLeaderboard(g){
  const sorted=[...g.players].sort((a,b)=>{
    if(a.eliminated&&!b.eliminated)return 1;
    if(!a.eliminated&&b.eliminated)return-1;
    return b.lives-a.lives||b.correct-a.correct;
  });
  const maxLives=g.lives;
  // Count played matches
  const playedIdxsLb=Object.keys(g.results||{}).map(Number).filter(n=>!isNaN(n)&&(g.results||{})[n]!=null);
  if(!g.predictions)g.predictions={};
  const el=document.getElementById('leaderboard');
  el.innerHTML=sorted.map((p,i)=>{
    const rankClass=i===0&&!p.eliminated?'gold':i===1&&!p.eliminated?'silver':i===2&&!p.eliminated?'bronze':'';
    const livePct=maxLives>0?Math.round(p.lives/maxLives*100):0;
    const barCol=livePct>60?'var(--green)':livePct>30?'var(--accent)':'var(--red)';
    const predictedLb=playedIdxsLb.filter(idx=>{const v=(g.predictions[idx]||{})[p.name];return v!=null;}).length;
    const accuracy=predictedLb>0?Math.round(p.correct/predictedLb*100):0;
    let scoreBonusLb=0;
    playedIdxsLb.forEach(idx=>{const r=(g.results||{})[idx];const sc=r&&(g.predictions[idx]||{})[p.name+'_score'];if(sc&&sc.home===r.home&&sc.away===r.away)scoreBonusLb++;});
    return`<div class="lb-row${p.eliminated?' eliminated':''}">
      <div class="lb-rank ${rankClass}">${p.eliminated?'💀':i+1}</div>
      <div>
        <button class="lb-name-btn" data-player="${p.name.replace(/"/g,'&quot;')}">${p.name}${p.isHost?' <span style="font-size:10px;color:var(--accent);opacity:0.7">(host)</span>':''}</button>
        <div class="life-bar-wrap"><div class="life-bar" style="width:${livePct}%;background:${barCol}"></div></div>
      </div>
      <div class="lb-lives" style="color:${barCol}" data-tip="Lives remaining out of ${maxLives}">❤️ ${p.lives}<span style="font-size:10px;color:var(--muted)">/${maxLives}</span></div>
      <div class="lb-correct" data-tip="Correct predictions">✓ ${p.correct}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Exact score bonuses" style="color:var(--accent2);font-size:12px">🎯 ${scoreBonusLb}</div>
      <div class="lb-pct lb-pct-tip" data-tip="Prediction accuracy (correct / matches played)">${accuracy}%</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.lb-name-btn').forEach(btn=>{
    btn.addEventListener('click',()=>showPlayerModal(btn.dataset.player));
  });
}

function actualOutcome(r){
  if(r.home>r.away)return'home';
  if(r.away>r.home)return'away';
  if(r.penWinner)return r.penWinner;
  return'draw';
}

function renderHistory(g){
  const players=[...g.players].sort((a,b)=>{
    if(a.eliminated&&!b.eliminated)return 1;
    if(!a.eliminated&&b.eliminated)return-1;
    return b.lives-a.lives||b.correct-a.correct;
  });
  const results=g.results||{};
  const playedIdxs=Object.keys(results).map(Number).filter(n=>!isNaN(n)&&results[n]!=null).sort((a,b)=>a-b);
  if(!g.predictions)g.predictions={};
  if(playedIdxs.length===0){
    document.getElementById('history-body').innerHTML=`<tr><td colspan="${players.length+3}" style="text-align:center;color:var(--muted);padding:24px">No matches played yet</td></tr>`;
    document.getElementById('history-head').innerHTML='';
    return;
  }

  // Header
  document.getElementById('history-head').innerHTML=`<tr>
    <th>#</th>
    <th>Match</th>
    <th class="center">Result</th>
    ${players.map(p=>`<th class="center">${p.name}</th>`).join('')}
  </tr>`;

  // Rows
  document.getElementById('history-body').innerHTML=playedIdxs.map(idx=>{
    const match=g.matches[idx];
    if(!match)return'';
    const r=results[idx];
    const actual=actualOutcome(r);
    const matchLabel=match.group
      ?`${flag(match.home)}${match.home} <span style="color:var(--muted)">vs</span> ${flag(match.away)}${match.away}`
      :`${flag(match.home)}${match.home} <span style="color:var(--muted)">vs</span> ${flag(match.away)}${match.away}`;
    const roundBadge=match.group
      ?`<span class="badge-group">Grp ${match.group}</span>`
      :`<span class="badge-ko">${match.round||'KO'}</span>`;
    const preds=g.predictions[idx]||{};
    const predCells=players.map(p=>{
      const v=preds[p.name];
      if(!v)return`<td class="pred-cell"><span class="pred-none">—</span></td>`;
      const correct=v===actual;
      const pickedTeam=v==='home'?match.home:v==='away'?match.away:'Draw';
      const pickedFlag=v==='draw'?'':flag(pickedTeam);
      return`<td class="pred-cell ${correct?'pred-hit':'pred-miss'}" style="white-space:nowrap">${correct?'✅':'❌'} ${pickedFlag}${pickedTeam}</td>`;
    }).join('');
    return`<tr>
      <td style="color:var(--muted);font-size:11px">${parseInt(idx)+1}</td>
      <td class="match-name">${roundBadge} ${matchLabel}<br><span style="font-size:10px;color:var(--muted)">${r.home}–${r.away}${r.penWinner?' (pens)':''} · ${actual==='home'?match.home:actual==='away'?match.away:'Draw'}</span></td>
      <td class="result">${r.home}–${r.away}${r.penWinner?`<br><span style="font-size:10px;color:var(--accent2)">${r.penWinner==='home'?'← pens':'pens →'}</span>`:''}</td>
      ${predCells}
    </tr>`;
  }).join('');
}
</script>

  <!-- Player detail modal -->
  <div class="modal-overlay" id="player-modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-player-name"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats" id="modal-stats"></div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted);margin-bottom:10px">MATCH PREDICTIONS</div>
        <div id="modal-picks"></div>
      </div>
    </div>
  </div>
</body>
</html>
